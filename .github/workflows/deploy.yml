name: Deploy

# Deploys the backend Lambda image and the frontend SPA.
# Requires these to be configured once from `terraform output`:
#   secret: AWS_DEPLOY_ROLE_ARN
#   vars:   AWS_REGION, ECR_REPOSITORY_URL, LAMBDA_FUNCTION_NAME,
#           FRONTEND_BUCKET, CLOUDFRONT_DISTRIBUTION_ID,
#           API_URL, COGNITO_AUTHORITY, COGNITO_CLIENT_ID, COGNITO_DOMAIN, FRONTEND_URL

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write # assume the OIDC deploy role
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_REPOSITORY_URL: ${{ vars.ECR_REPOSITORY_URL }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$ECR_REPOSITORY_URL:$IMAGE_TAG" -t "$ECR_REPOSITORY_URL:latest" apps/backend
          docker push "$ECR_REPOSITORY_URL:$IMAGE_TAG"
          docker push "$ECR_REPOSITORY_URL:latest"

      - name: Update Lambda
        env:
          LAMBDA_FUNCTION_NAME: ${{ vars.LAMBDA_FUNCTION_NAME }}
          ECR_REPOSITORY_URL: ${{ vars.ECR_REPOSITORY_URL }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws lambda update-function-code \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --image-uri "$ECR_REPOSITORY_URL:$IMAGE_TAG"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/frontend/pnpm-lock.yaml

      - name: Build
        working-directory: apps/frontend
        env:
          VITE_COGNITO_AUTHORITY: ${{ vars.COGNITO_AUTHORITY }}
          VITE_COGNITO_CLIENT_ID: ${{ vars.COGNITO_CLIENT_ID }}
          VITE_COGNITO_DOMAIN: ${{ vars.COGNITO_DOMAIN }}
          VITE_REDIRECT_URI: ${{ vars.FRONTEND_URL }}
          VITE_API_BASE_URL: ${{ vars.API_URL }}/api/v1
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync to S3 and invalidate CloudFront
        env:
          FRONTEND_BUCKET: ${{ vars.FRONTEND_BUCKET }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          aws s3 sync apps/frontend/dist "s3://$FRONTEND_BUCKET" --delete
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/*"
